<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFM — Already running</title>

  <style>
    @import "@fontsource-variable/geist";

    :root {
      --background: oklch(1 0 0);
      --foreground: oklch(0.145 0 0);
      --muted-foreground: oklch(0.556 0 0);
    }

    .dark {
      --background: oklch(0.145 0 0);
      --foreground: oklch(0.985 0 0);
      --muted-foreground: oklch(0.708 0 0);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--background);
      color: var(--foreground);
      font-family: 'Geist Variable', sans-serif;

      display: grid;
      place-items: center;

      user-select: none;
      -webkit-user-select: none;
    }

    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      max-width: 280px;
      padding: 16px;
    }

    .logo {
      width: 72px;
      height: 72px;
      animation: float 2s ease-in-out infinite;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    .text {
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted-foreground);
    }

    .hint {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted-foreground);
      opacity: 0.9;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-6px);
      }
    }
  </style>
</head>

<body>

  <div class="container pointer-events-none">
    <img class="logo" src="/app-icon.png" alt="" />
    <div class="title">Already running</div>
    <div class="text">CFM is already open. Only one instance can run at a time.</div>
    <div class="hint">Check the system tray or taskbar for the existing window.</div>
  </div>

  <script>
    if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
      document.documentElement.classList.add("dark");
    }
  </script>

</body>

</html>
